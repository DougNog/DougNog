<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
<path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1f2e" stroke-width="0.5"/>
</pattern>
</defs>

<rect x="10" y="10" width="660" height="340" rx="16" fill="#0d1117"/>
<rect x="10" y="10" width="660" height="340" rx="16" fill="url(#grid)"/>
<rect x="10" y="10" width="660" height="340" rx="16" fill="none" stroke="#6c63ff" stroke-width="1"/>

<rect x="30" y="30" width="160" height="16" rx="3" fill="#6c63ff"/>
<text x="110" y="42" font-family="monospace" font-size="11" font-weight="500" fill="#0d1117" text-anchor="middle">CHARACTER SHEET</text>

<g transform="translate(40, 70)">
<rect x="0" y="0" width="120" height="140" rx="8" fill="#161b2e" stroke="#2d3447" stroke-width="1"/>
<circle cx="60" cy="55" r="32" fill="none" stroke="#6c63ff" stroke-width="1.5"/>
<circle cx="60" cy="48" r="12" fill="#6c63ff"/>
<path d="M 38 80 Q 60 65 82 80 L 82 90 L 38 90 Z" fill="#6c63ff"/>
<text x="60" y="115" font-family="monospace" font-size="13" font-weight="500" fill="#e6edf3" text-anchor="middle">DougNog</text>
<text x="60" y="130" font-family="monospace" font-size="10" fill="#00d9ff" text-anchor="middle">Lv. 15 • Web Dev</text>
</g>

<g transform="translate(180, 70)">
<text x="0" y="12" font-family="monospace" font-size="10" fill="#6b7280">HP</text>
<rect x="30" y="3" width="200" height="10" rx="2" fill="#1a1f2e"/>
<rect x="30" y="3" width="0" height="10" rx="2" fill="#ff5f56">
<animate attributeName="width" values="0;180" dur="1.2s" begin="0s" fill="freeze"/>
</rect>
<text x="240" y="12" font-family="monospace" font-size="10" fill="#e6edf3">180/200</text>

<text x="0" y="32" font-family="monospace" font-size="10" fill="#6b7280">MP</text>
<rect x="30" y="23" width="200" height="10" rx="2" fill="#1a1f2e"/>
<rect x="30" y="23" width="0" height="10" rx="2" fill="#00d9ff">
<animate attributeName="width" values="0;150" dur="1.2s" begin="0.2s" fill="freeze"/>
</rect>
<text x="240" y="32" font-family="monospace" font-size="10" fill="#e6edf3">150/200</text>

<text x="0" y="52" font-family="monospace" font-size="10" fill="#6b7280">XP</text>
<rect x="30" y="43" width="200" height="10" rx="2" fill="#1a1f2e"/>
<rect x="30" y="43" width="0" height="10" rx="2" fill="#f7df1e">
<animate attributeName="width" values="0;140" dur="1.2s" begin="0.4s" fill="freeze"/>
</rect>
<text x="240" y="52" font-family="monospace" font-size="10" fill="#e6edf3">1420/2000</text>
</g>

<g transform="translate(180, 140)" font-family="monospace" font-size="11">
<text x="0" y="0" fill="#6b7280">ATTRIBUTES</text>

<text x="0" y="20" fill="#e6edf3">STR</text>
<text x="60" y="20" fill="#00d9ff">14</text>
<text x="90" y="20" fill="#6b7280">(HTML)</text>

<text x="0" y="38" fill="#e6edf3">DEX</text>
<text x="60" y="38" fill="#00d9ff">16</text>
<text x="90" y="38" fill="#6b7280">(CSS)</text>

<text x="0" y="56" fill="#e6edf3">INT</text>
<text x="60" y="56" fill="#00d9ff">15</text>
<text x="90" y="56" fill="#6b7280">(JS)</text>

<text x="170" y="20" fill="#e6edf3">WIS</text>
<text x="230" y="20" fill="#00d9ff">13</text>
<text x="260" y="20" fill="#6b7280">(Python)</text>

<text x="170" y="38" fill="#e6edf3">CHA</text>
<text x="230" y="38" fill="#00d9ff">12</text>
<text x="260" y="38" fill="#6b7280">(Dart)</text>

<text x="170" y="56" fill="#e6edf3">CON</text>
<text x="230" y="56" fill="#00d9ff">11</text>
<text x="260" y="56" fill="#6b7280">(MySQL)</text>
</g>

<g transform="translate(450, 70)">
<rect x="0" y="0" width="200" height="220" rx="8" fill="#161b2e" stroke="#2d3447" stroke-width="1"/>
<text x="100" y="22" font-family="monospace" font-size="11" fill="#6c63ff" text-anchor="middle">EQUIPMENT</text>
<line x1="15" y1="32" x2="185" y2="32" stroke="#2d3447" stroke-width="0.5"/>

<g font-family="monospace" font-size="10">
<text x="15" y="55" fill="#6b7280">Weapon</text>
<text x="185" y="55" fill="#f7df1e" text-anchor="end">Keyboard +5</text>

<text x="15" y="80" fill="#6b7280">Shield</text>
<text x="185" y="80" fill="#00d9ff" text-anchor="end">Stack Overflow</text>

<text x="15" y="105" fill="#6b7280">Armor</text>
<text x="185" y="105" fill="#e6edf3" text-anchor="end">Hoodie of Focus</text>

<text x="15" y="130" fill="#6b7280">Helmet</text>
<text x="185" y="130" fill="#e6edf3" text-anchor="end">Headphones</text>

<text x="15" y="155" fill="#6b7280">Ring</text>
<text x="185" y="155" fill="#ff5f56" text-anchor="end">Caffeine +∞</text>

<text x="15" y="180" fill="#6b7280">Boots</text>
<text x="185" y="180" fill="#e6edf3" text-anchor="end">Chinelo</text>

<text x="15" y="205" fill="#6b7280">Pet</text>
<text x="185" y="205" fill="#27c93f" text-anchor="end">Rubber Duck</text>
</g>
</g>

<g transform="translate(40, 240)">
<text x="0" y="0" font-family="monospace" font-size="10" fill="#6b7280">CURRENT QUEST</text>
<rect x="0" y="10" width="380" height="40" rx="6" fill="#161b2e" stroke="#6c63ff" stroke-width="1" stroke-dasharray="3,3">
<animate attributeName="stroke-dashoffset" values="0;-12" dur="0.8s" repeatCount="indefinite"/>
</rect>
<text x="12" y="28" font-family="monospace" font-size="11" fill="#e6edf3">⚔ Dominar o desenvolvimento full-stack</text>
<text x="12" y="43" font-family="monospace" font-size="10" fill="#00d9ff">Progress: ████████░░░░░░ 57%</text>
</g>

<g transform="translate(40, 310)">
<circle cx="6" cy="6" r="5" fill="#27c93f">
<animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
</circle>
<text x="18" y="10" font-family="monospace" font-size="10" fill="#27c93f">ONLINE • pronto para o próximo boss</text>
</g>
</svg>
